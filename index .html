<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎲 Ludo King</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0a1a;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
        }

        .game-wrapper {
            max-width: 700px;
            width: 100%;
            background: linear-gradient(145deg, #1e1435, #120c20);
            border-radius: 40px;
            padding: 20px 18px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.06);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .logo .dice-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.3));
        }

        .turn-indicator {
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #b8a5d9;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .turn-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            transition: background 0.3s;
        }

        /* Canvas */
        .board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #1a1228;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6), 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 215, 0, 0.08);
        }

        #boardCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .dice-area {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px 6px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            min-width: 150px;
        }

        .dice-display {
            font-size: 2.8rem;
            line-height: 1;
            min-width: 48px;
            text-align: center;
            filter: drop-shadow(0 0 16px rgba(255, 215, 0, 0.15));
            transition: transform 0.15s;
        }

        .dice-display.rolling {
            animation: diceRoll 0.5s ease-out;
        }

        @keyframes diceRoll {
            0% {
                transform: rotate(0deg) scale(1);
            }
            25% {
                transform: rotate(90deg) scale(1.2);
            }
            50% {
                transform: rotate(180deg) scale(0.9);
            }
            75% {
                transform: rotate(270deg) scale(1.1);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .roll-btn {
            background: linear-gradient(145deg, #ffd700, #e6a800);
            border: none;
            color: #1a1228;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .roll-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.35);
        }

        .roll-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .roll-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #9a84b9;
            font-size: 1.2rem;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reset-btn:hover {
            background: rgba(255, 70, 70, 0.12);
            border-color: rgba(255, 70, 70, 0.15);
            color: #ff8a8a;
        }

        .status-msg {
            color: #c9b8e6;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex: 1;
            min-width: 100px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            justify-content: center;
        }

        .player-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #b8a5d9;
        }

        .player-badge .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-badge .home-count {
            background: rgba(0, 0, 0, 0.3);
            padding: 0 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            color: #ffd700;
        }

        .winner-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s;
        }

        .winner-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .winner-overlay .trophy {
            font-size: 4rem;
            margin-bottom: 6px;
            animation: float 2s ease-in-out infinite;
        }

        .winner-overlay .win-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .winner-overlay .win-sub {
            color: #c9b8e6;
            font-size: 1rem;
            margin-top: 4px;
        }

        .winner-overlay .play-again-btn {
            margin-top: 16px;
            background: linear-gradient(145deg, #ffd700, #e6a800);
            border: none;
            color: #1a1228;
            font-weight: 700;
            font-size: 1rem;
            padding: 10px 36px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 24px rgba(255, 215, 0, 0.25);
        }

        .winner-overlay .play-again-btn:hover {
            transform: scale(1.04);
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        @media (max-width: 480px) {
            .game-wrapper {
                padding: 12px 10px 16px;
            }
            .logo h1 {
                font-size: 1.2rem;
            }
            .dice-display {
                font-size: 2rem;
                min-width: 36px;
            }
            .roll-btn {
                font-size: 0.75rem;
                padding: 6px 14px;
            }
            .turn-indicator {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
            .controls {
                gap: 8px;
            }
            .dice-area {
                padding: 4px 10px 4px 14px;
                min-width: 100px;
            }
            .reset-btn {
                font-size: 1rem;
                padding: 4px 12px;
                height: 38px;
            }
            .status-msg {
                font-size: 0.65rem;
                min-width: 60px;
            }
            .player-badge {
                font-size: 0.6rem;
                padding: 2px 10px 2px 6px;
            }
            .winner-overlay .win-text {
                font-size: 1.3rem;
            }
            .winner-overlay .trophy {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span class="dice-icon">🎲</span>
                <h1>Ludo King</h1>
            </div>
            <div class="turn-indicator">
                <span class="turn-dot" id="turnDot" style="background:#e74c3c;"></span>
                <span id="turnLabel">Red</span>
            </div>
        </div>

        <!-- Board -->
        <div class="board-container" id="boardContainer">
            <canvas id="boardCanvas"></canvas>
            <!-- Winner overlay -->
            <div class="winner-overlay" id="winnerOverlay">
                <div class="trophy">🏆</div>
                <div class="win-text" id="winText">Red Wins!</div>
                <div class="win-sub" id="winSub">🎉 Congratulations</div>
                <button class="play-again-btn" id="playAgainBtn">🔄 Play Again</button>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="dice-area">
                <span class="dice-display" id="diceDisplay">⚀</span>
                <button class="roll-btn" id="rollBtn">🎲 Roll</button>
            </div>
            <div class="status-msg" id="statusMsg">Roll the dice!</div>
            <button class="reset-btn" id="resetBtn">⟳</button>
        </div>

        <!-- Player stats -->
        <div class="player-stats" id="playerStats"></div>
    </div>

    <script>
        (function() {
            "use strict";

            // ─── CONSTANTS ──────────────────────────────────────────────
            const COLORS = ['#e74c3c', '#2ecc71', '#f1c40f', '#3498db'];
            const COLOR_NAMES = ['Red', 'Green', 'Yellow', 'Blue'];
            const COLOR_LIGHT = ['#f1948a', '#82e0aa', '#f9e79f', '#85c1e9'];
            const COLOR_DARK = ['#922b21', '#1a7a3a', '#b7950b', '#1a5276'];
            const COLOR_HOME = ['#e74c3c', '#2ecc71', '#f1c40f', '#3498db'];

            const BOARD_SIZE = 15;
            const PATH_LENGTH = 52;
            const HOME_COLUMN_LENGTH = 6;
            const TOKENS_PER_PLAYER = 4;
            const NUM_PLAYERS = 4;

            // ─── PATH DEFINITION (15x15 grid) ──────────────────────────
            // 52 positions going clockwise from bottom-left
            const PATH = [
                [6, 1],
                [6, 2],
                [6, 3],
                [6, 4],
                [6, 5],
                [5, 6],
                [4, 6],
                [3, 6],
                [2, 6],
                [1, 6],
                [0, 6],
                [0, 7],
                [0, 8],
                [1, 8],
                [2, 8],
                [3, 8],
                [4, 8],
                [5, 8],
                [6, 9],
                [6, 10],
                [6, 11],
                [6, 12],
                [6, 13],
                [6, 14],
                [7, 14],
                [8, 14],
                [8, 13],
                [8, 12],
                [8, 11],
                [8, 10],
                [8, 9],
                [9, 8],
                [10, 8],
                [11, 8],
                [12, 8],
                [13, 8],
                [14, 8],
                [14, 7],
                [14, 6],
                [13, 6],
                [12, 6],
                [11, 6],
                [10, 6],
                [9, 6],
                [8, 5],
                [8, 4],
                [8, 3],
                [8, 2],
                [8, 1],
                [8, 0],
                [7, 0],
                [7, 1]
            ];

            // Each player's start position on the path
            const START_POS = [0, 13, 26, 39];

            // Home column for each player (from path to center)
            // These are the positions leading from the path to the center
            const HOME_COLUMN = [
                [
                    [6, 1],
                    [6, 2],
                    [6, 3],
                    [6, 4],
                    [6, 5],
                    [6, 6]
                ],
                [
                    [1, 8],
                    [2, 8],
                    [3, 8],
                    [4, 8],
                    [5, 8],
                    [6, 8]
                ],
                [
                    [8, 13],
                    [8, 12],
                    [8, 11],
                    [8, 10],
                    [8, 9],
                    [8, 8]
                ],
                [
                    [13, 6],
                    [12, 6],
                    [11, 6],
                    [10, 6],
                    [9, 6],
                    [8, 6]
                ]
            ];

            // ─── STATE ──────────────────────────────────────────────────
            let game = {
                players: [],
                currentPlayer: 0,
                diceValue: 1,
                phase: 'ROLL', // ROLL | SELECT | ANIMATING
                winner: -1,
                turnCount: 0,
                moveHistory: []
            };

            // Each player: { color, tokens: [{pos, home, finished}], inHome }
            function initPlayer(pIdx) {
                const tokens = [];
                for (let i = 0; i < TOKENS_PER_PLAYER; i++) {
                    tokens.push({
                        pos: -1, // -1 = in home base
                        home: false, // on home column?
                        finished: false,
                        homeIdx: -1 // index in home column
                    });
                }
                return {
                    color: COLORS[pIdx],
                    name: COLOR_NAMES[pIdx],
                    tokens: tokens,
                    finishedCount: 0
                };
            }

            function initGame() {
                game.players = [];
                for (let i = 0; i < NUM_PLAYERS; i++) {
                    game.players.push(initPlayer(i));
                }
                game.currentPlayer = 0;
                game.diceValue = 1;
                game.phase = 'ROLL';
                game.winner = -1;
                game.turnCount = 0;
                game.moveHistory = [];
                document.getElementById('winnerOverlay').classList.remove('show');
            }

            // ─── CANVAS SETUP ──────────────────────────────────────────
            const canvas = document.getElementById('boardCanvas');
            const ctx = canvas.getContext('2d');
            let cellSize = 0;
            let canvasSize = 0;

            function resizeCanvas() {
                const container = document.getElementById('boardContainer');
                const rect = container.getBoundingClientRect();
                const size = rect.width;
                canvas.width = size * window.devicePixelRatio;
                canvas.height = size * window.devicePixelRatio;
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
                canvasSize = size;
                cellSize = size / BOARD_SIZE;
                ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                drawBoard();
            }

            // ─── DRAWING ────────────────────────────────────────────────
            function getCellCenter(row, col) {
                return {
                    x: col * cellSize + cellSize / 2,
                    y: row * cellSize + cellSize / 2
                };
            }

            function drawBoard() {
                const w = canvasSize;
                const cs = cellSize;

                // Background
                ctx.fillStyle = '#1a1228';
                ctx.fillRect(0, 0, w, w);

                // Draw grid
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        const x = c * cs,
                            y = r * cs;
                        // Determine cell type
                        const isHomeBase = isInHomeBase(r, c);
                        const isPath = isOnPath(r, c);
                        const isHomeCol = isOnHomeColumn(r, c);
                        const isCenter = (r === 7 && c === 7);

                        if (isCenter) {
                            // Center star
                            const grad = ctx.createRadialGradient(x + cs / 2, y + cs / 2, 0, x + cs / 2, y + cs / 2, cs / 2);
                            grad.addColorStop(0, '#ffd700');
                            grad.addColorStop(1, '#b8860b');
                            ctx.fillStyle = grad;
                            ctx.fillRect(x, y, cs, cs);
                            ctx.fillStyle = '#fff';
                            ctx.font = `${cs * 0.5}px serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('⭐', x + cs / 2, y + cs / 2);
                            continue;
                        }

                        if (isHomeBase) {
                            const pIdx = getHomeBaseOwner(r, c);
                            if (pIdx >= 0) {
                                const col = COLOR_HOME[pIdx];
                                const grad = ctx.createRadialGradient(x + cs / 2, y + cs / 2, 0, x + cs / 2, y + cs / 2, cs /
                                0.7);
                                grad.addColorStop(0, lightenColor(col, 40));
                                grad.addColorStop(1, col);
                                ctx.fillStyle = grad;
                                ctx.fillRect(x, y, cs, cs);
                                // Draw circle in home base
                                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.arc(x + cs / 2, y + cs / 2, cs * 0.2, 0, Math.PI * 2);
                                ctx.stroke();
                            }
                            continue;
                        }

                        if (isPath) {
                            // Path cell
                            const isStart = isStartPosition(r, c);
                            const isSafe = isSafePosition(r, c);
                            ctx.fillStyle = isSafe ? '#2d2145' : '#231a35';
                            ctx.fillRect(x, y, cs, cs);
                            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                            ctx.lineWidth = 0.5;
                            ctx.strokeRect(x, y, cs, cs);

                            if (isStart) {
                                const pIdx = getStartOwner(r, c);
                                if (pIdx >= 0) {
                                    ctx.fillStyle = COLORS[pIdx];
                                    ctx.beginPath();
                                    ctx.arc(x + cs / 2, y + cs / 2, cs * 0.15, 0, Math.PI * 2);
                                    ctx.fill();
                                }
                            }
                            if (isSafe) {
                                ctx.fillStyle = 'rgba(255,215,0,0.08)';
                                ctx.beginPath();
                                ctx.arc(x + cs / 2, y + cs / 2, cs * 0.12, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.fillStyle = 'rgba(255,215,0,0.15)';
                                ctx.font = `${cs * 0.25}px sans-serif`;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText('✦', x + cs / 2, y + cs / 2);
                            }
                            continue;
                        }

                        if (isHomeCol) {
                            const pIdx = getHomeColOwner(r, c);
                            if (pIdx >= 0) {
                                const col = COLOR_HOME[pIdx];
                                ctx.fillStyle = darkenColor(col, 20);
                                ctx.fillRect(x, y, cs, cs);
                                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                                ctx.lineWidth = 0.5;
                                ctx.strokeRect(x, y, cs, cs);
                                // small dot
                                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                                ctx.beginPath();
                                ctx.arc(x + cs / 2, y + cs / 2, cs * 0.06, 0, Math.PI * 2);
                                ctx.fill();
                            }
                            continue;
                        }

                        // Empty cell
                        ctx.fillStyle = '#150f21';
                        ctx.fillRect(x, y, cs, cs);
                        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(x, y, cs, cs);
                    }
                }

                // Draw tokens
                drawTokens();

                // Draw home base labels
                drawHomeLabels();

                // Draw turn highlight
                drawTurnHighlight();
            }

            function drawHomeLabels() {
                const labels = ['Red', 'Green', 'Yellow', 'Blue'];
                const positions = [
                    [2, 2],
                    [2, 12],
                    [12, 2],
                    [12, 12]
                ];
                ctx.font = `${cellSize * 0.2}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                for (let i = 0; i < 4; i++) {
                    const [r, c] = positions[i];
                    const x = c * cellSize + cellSize / 2;
                    const y = r * cellSize + cellSize / 2;
                    ctx.fillStyle = 'rgba(255,255,255,0.06)';
                    ctx.fillText(labels[i], x, y);
                }
            }

            function drawTurnHighlight() {
                if (game.winner >= 0) return;
                const p = game.currentPlayer;
                // highlight the current player's home base
                const homePos = [
                    [2, 2],
                    [2, 12],
                    [12, 2],
                    [12, 12]
                ];
                const [r, c] = homePos[p];
                const x = c * cellSize;
                const y = r * cellSize;
                ctx.strokeStyle = COLORS[p];
                ctx.lineWidth = 3;
                ctx.shadowColor = COLORS[p];
                ctx.shadowBlur = 20;
                ctx.strokeRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
                ctx.shadowBlur = 0;
            }

            function drawTokens() {
                for (let pIdx = 0; pIdx < game.players.length; pIdx++) {
                    const player = game.players[pIdx];
                    const color = player.color;
                    for (let tIdx = 0; tIdx < player.tokens.length; tIdx++) {
                        const token = player.tokens[tIdx];
                        if (token.finished) continue;

                        let pos = token.pos;
                        let row, col;

                        if (pos >= 0 && pos < PATH_LENGTH) {
                            // On main path
                            const [r, c] = PATH[pos];
                            row = r;
                            col = c;
                        } else if (token.home && token.homeIdx >= 0) {
                            // On home column
                            const [r, c] = HOME_COLUMN[pIdx][token.homeIdx];
                            row = r;
                            col = c;
                        } else {
                            // In home base
                            const homePos = [
                                [1, 1],
                                [1, 13],
                                [13, 1],
                                [13, 13]
                            ];
                            const baseR = homePos[pIdx][0];
                            const baseC = homePos[pIdx][1];
                            const offsets = [
                                [-0.6, -0.6],
                                [-0.6, 0.6],
                                [0.6, -0.6],
                                [0.6, 0.6]
                            ];
                            const off = offsets[tIdx % offsets.length];
                            row = baseR + off[0] * 0.8;
                            col = baseC + off[1] * 0.8;
                            // Draw in home base
                            const x = col * cellSize;
                            const y = row * cellSize;
                            const radius = cellSize * 0.15;
                            ctx.shadowColor = color;
                            ctx.shadowBlur = 12;
                            ctx.fillStyle = color;
                            ctx.beginPath();
                            ctx.arc(x, y, radius, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.arc(x, y, radius, 0, Math.PI * 2);
                            ctx.stroke();
                            continue;
                        }

                        // Draw token on board
                        const x = col * cellSize + cellSize / 2;
                        const y = row * cellSize + cellSize / 2;
                        const radius = cellSize * 0.17;
                        const isSelected = (game.phase === 'SELECT' && pIdx === game.currentPlayer &&
                            token.pos >= 0 && !token.home && !token.finished);

                        ctx.shadowColor = color;
                        ctx.shadowBlur = isSelected ? 30 : 15;
                        // Glow for selectable
                        if (isSelected) {
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 30;
                            ctx.beginPath();
                            ctx.arc(x, y, radius * 1.5, 0, Math.PI * 2);
                            ctx.fillStyle = 'rgba(255,215,0,0.1)';
                            ctx.fill();
                            ctx.shadowBlur = 15;
                            ctx.shadowColor = color;
                        }

                        // Token body
                        const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
                        grad.addColorStop(0, lightenColor(color, 60));
                        grad.addColorStop(1, color);
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        // Border
                        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.stroke();

                        // Inner dot
                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.beginPath();
                        ctx.arc(x - radius * 0.2, y - radius * 0.25, radius * 0.25, 0, Math.PI * 2);
                        ctx.fill();

                        // Token number
                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.font = `${radius * 0.8}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(tIdx + 1, x, y + 1);

                        // Select indicator
                        if (isSelected) {
                            ctx.strokeStyle = '#ffd700';
                            ctx.lineWidth = 2;
                            ctx.setLineDash([3, 4]);
                            ctx.beginPath();
                            ctx.arc(x, y, radius * 1.3, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.setLineDash([]);
                        }
                    }
                }
            }

            // ─── UTILITY FUNCTIONS ──────────────────────────────────────
            function isInHomeBase(r, c) {
                return (r < 6 && c < 6) || (r < 6 && c > 8) || (r > 8 && c < 6) || (r > 8 && c > 8);
            }

            function getHomeBaseOwner(r, c) {
                if (r < 6 && c < 6) return 0;
                if (r < 6 && c > 8) return 1;
                if (r > 8 && c < 6) return 2;
                if (r > 8 && c > 8) return 3;
                return -1;
            }

            function isOnPath(r, c) {
                for (let i = 0; i < PATH.length; i++) {
                    if (PATH[i][0] === r && PATH[i][1] === c) return true;
                }
                return false;
            }

            function isOnHomeColumn(r, c) {
                for (let p = 0; p < 4; p++) {
                    for (let i = 0; i < HOME_COLUMN[p].length; i++) {
                        if (HOME_COLUMN[p][i][0] === r && HOME_COLUMN[p][i][1] === c) return true;
                    }
                }
                return false;
            }

            function getHomeColOwner(r, c) {
                for (let p = 0; p < 4; p++) {
                    for (let i = 0; i < HOME_COLUMN[p].length; i++) {
                        if (HOME_COLUMN[p][i][0] === r && HOME_COLUMN[p][i][1] === c) return p;
                    }
                }
                return -1;
            }

            function isStartPosition(r, c) {
                const starts = [
                    [6, 1],
                    [1, 8],
                    [8, 13],
                    [13, 6]
                ];
                for (let i = 0; i < starts.length; i++) {
                    if (starts[i][0] === r && starts[i][1] === c) return true;
                }
                return false;
            }

            function getStartOwner(r, c) {
                const starts = [
                    [6, 1],
                    [1, 8],
                    [8, 13],
                    [13, 6]
                ];
                for (let i = 0; i < starts.length; i++) {
                    if (starts[i][0] === r && starts[i][1] === c) return i;
                }
                return -1;
            }

            function isSafePosition(r, c) {
                const safe = [
                    [6, 1],
                    [0, 7],
                    [6, 14],
                    [14, 7],
                    [7, 0],
                    [7, 14],
                    [1, 6],
                    [13, 6],
                    [6, 5],
                    [6, 9],
                    [5, 6],
                    [9, 6],
                    [0, 6],
                    [14, 6],
                    [6, 0],
                    [6, 14]
                ];
                // Also the star positions near center
                for (let i = 0; i < safe.length; i++) {
                    if (safe[i][0] === r && safe[i][1] === c) return true;
                }
                return false;
            }

            function lightenColor(hex, amt) {
                let r = parseInt(hex.slice(1, 2), 16) * 17;
                let g = parseInt(hex.slice(2, 3), 16) * 17;
                let b = parseInt(hex.slice(3, 4), 16) * 17;
                if (hex.length === 7) {
                    r = parseInt(hex.slice(1, 3), 16);
                    g = parseInt(hex.slice(3, 5), 16);
                    b = parseInt(hex.slice(5, 7), 16);
                }
                r = Math.min(255, r + amt);
                g = Math.min(255, g + amt);
                b = Math.min(255, b + amt);
                return `rgb(${r},${g},${b})`;
            }

            function darkenColor(hex, amt) {
                let r = parseInt(hex.slice(1, 2), 16) * 17;
                let g = parseInt(hex.slice(2, 3), 16) * 17;
                let b = parseInt(hex.slice(3, 4), 16) * 17;
                if (hex.length === 7) {
                    r = parseInt(hex.slice(1, 3), 16);
                    g = parseInt(hex.slice(3, 5), 16);
                    b = parseInt(hex.slice(5, 7), 16);
                }
                r = Math.max(0, r - amt);
                g = Math.max(0, g - amt);
                b = Math.max(0, b - amt);
                return `rgb(${r},${g},${b})`;
            }

            // ─── GAME LOGIC ─────────────────────────────────────────────

            function getDiceEmoji(val) {
                return ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][val - 1] || '⚀';
            }

            function getMovableTokens(playerIdx, diceVal) {
                const player = game.players[playerIdx];
                const movable = [];
                for (let i = 0; i < player.tokens.length; i++) {
                    const token = player.tokens[i];
                    if (token.finished) continue;
                    // Check if token can move
                    if (token.pos === -1) {
                        // In home base - can come out only on 6
                        if (diceVal === 6) {
                            // Check if start position is occupied by own token
                            const startPos = START_POS[playerIdx];
                            const occupied = isPathOccupied(playerIdx, startPos, -1);
                            if (!occupied) {
                                movable.push({ idx: i, pos: token.pos, canEnter: true, homeIdx: -1 });
                            }
                        }
                    } else if (token.home) {
                        // On home column
                        const newIdx = token.homeIdx + diceVal;
                        if (newIdx < HOME_COLUMN[playerIdx].length) {
                            // Check if target occupied by own token
                            const targetPos = HOME_COLUMN[playerIdx][newIdx];
                            const occupied = isHomeColumnOccupied(playerIdx, newIdx, i);
                            if (!occupied) {
                                movable.push({ idx: i, pos: token.pos, canEnter: false, homeIdx: newIdx, fromHome: true });
                            }
                        } else if (newIdx === HOME_COLUMN[playerIdx].length) {
                            // Reached center (finished)
                            movable.push({ idx: i, pos: token.pos, canEnter: false, homeIdx: -1, finish: true });
                        }
                    } else {
                        // On main path
                        let newPos = token.pos + diceVal;
                        if (newPos < PATH_LENGTH) {
                            // Check if target occupied by own token (blocking)
                            const occupied = isPathOccupied(playerIdx, newPos, i);
                            if (!occupied) {
                                movable.push({ idx: i, pos: token.pos, canEnter: false, homeIdx: -1, newPos: newPos });
                            }
                        } else {
                            // Enter home column
                            const entryIdx = newPos - PATH_LENGTH;
                            if (entryIdx < HOME_COLUMN[playerIdx].length) {
                                const occupied = isHomeColumnOccupied(playerIdx, entryIdx, i);
                                if (!occupied) {
                                    movable.push({ idx: i, pos: token.pos, canEnter: true, homeIdx: entryIdx });
                                }
                            } else if (entryIdx === HOME_COLUMN[playerIdx].length) {
                                // Reached center (finished)
                                movable.push({ idx: i, pos: token.pos, canEnter: false, homeIdx: -1, finish: true });
                            }
                        }
                    }
                }
                return movable;
            }

            function isPathOccupied(playerIdx, pos, excludeIdx) {
                const player = game.players[playerIdx];
                for (let i = 0; i < player.tokens.length; i++) {
                    if (i === excludeIdx) continue;
                    const t = player.tokens[i];
                    if (t.finished) continue;
                    if (t.pos === pos && !t.home) return true;
                }
                // Also check other players (for collision)
                for (let p = 0; p < game.players.length; p++) {
                    if (p === playerIdx) continue;
                    const other = game.players[p];
                    for (let i = 0; i < other.tokens.length; i++) {
                        const t = other.tokens[i];
                        if (t.finished) continue;
                        if (t.pos === pos && !t.home) return true;
                    }
                }
                return false;
            }

            function isHomeColumnOccupied(playerIdx, homeIdx, excludeIdx) {
                const player = game.players[playerIdx];
                for (let i = 0; i < player.tokens.length; i++) {
                    if (i === excludeIdx) continue;
                    const t = player.tokens[i];
                    if (t.finished) continue;
                    if (t.home && t.homeIdx === homeIdx) return true;
                }
                return false;
            }

            function moveToken(playerIdx, tokenIdx, moveData) {
                const player = game.players[playerIdx];
                const token = player.tokens[tokenIdx];

                if (moveData.canEnter && moveData.pos === -1) {
                    // Enter from home base
                    token.pos = START_POS[playerIdx];
                    token.home = false;
                    token.homeIdx = -1;
                    // Check for collision with opponent
                    const collided = handleCollision(playerIdx, token.pos);
                    return { action: 'enter', collided };
                }

                if (moveData.finish) {
                    token.finished = true;
                    token.pos = -1;
                    token.home = false;
                    token.homeIdx = -1;
                    player.finishedCount++;
                    if (player.finishedCount === TOKENS_PER_PLAYER) {
                        game.winner = playerIdx;
                    }
                    return { action: 'finish' };
                }

                if (moveData.fromHome) {
                    // Move within home column
                    token.homeIdx = moveData.homeIdx;
                    return { action: 'homeMove' };
                }

                if (moveData.canEnter && moveData.pos >= 0) {
                    // Enter home column from path
                    token.pos = -1;
                    token.home = true;
                    token.homeIdx = moveData.homeIdx;
                    return { action: 'enterHome' };
                }

                if (moveData.newPos !== undefined) {
                    // Move on path
                    const oldPos = token.pos;
                    token.pos = moveData.newPos;
                    // Check for collision
                    const collided = handleCollision(playerIdx, token.pos);
                    return { action: 'move', from: oldPos, to: token.pos, collided };
                }

                return { action: 'none' };
            }

            function handleCollision(playerIdx, pos) {
                // Check if any opponent token is at this position (not safe)
                if (isSafePosition(PATH[pos][0], PATH[pos][1])) return false;

                let collided = false;
                for (let p = 0; p < game.players.length; p++) {
                    if (p === playerIdx) continue;
                    const player = game.players[p];
                    for (let i = 0; i < player.tokens.length; i++) {
                        const t = player.tokens[i];
                        if (t.finished) continue;
                        if (t.pos === pos && !t.home) {
                            // Send token home
                            t.pos = -1;
                            t.home = false;
                            t.homeIdx = -1;
                            collided = true;
                        }
                    }
                }
                return collided;
            }

            function getTokenPosition(playerIdx, tokenIdx) {
                const token = game.players[playerIdx].tokens[tokenIdx];
                if (token.finished) return null;
                if (token.pos >= 0 && token.pos < PATH_LENGTH) {
                    return { type: 'path', pos: token.pos, row: PATH[token.pos][0], col: PATH[token.pos][1] };
                }
                if (token.home && token.homeIdx >= 0) {
                    const [r, c] = HOME_COLUMN[playerIdx][token.homeIdx];
                    return { type: 'home', pos: token.homeIdx, row: r, col: c };
                }
                return null;
            }

            // ─── AI LOGIC ───────────────────────────────────────────────

            function aiTurn(playerIdx) {
                const dice = Math.floor(Math.random() * 6) + 1;
                game.diceValue = dice;
                updateDiceDisplay(dice);

                const movable = getMovableTokens(playerIdx, dice);

                if (movable.length === 0) {
                    // No moves available
                    return { moved: false, dice: dice };
                }

                // AI strategy: prefer finishing, then entering home, then advancing
                // Sort: finish > enter home > move forward > enter from base
                movable.sort((a, b) => {
                    if (a.finish) return -1;
                    if (b.finish) return 1;
                    if (a.canEnter && a.pos === -1) return 1;
                    if (b.canEnter && b.pos === -1) return -1;
                    if (a.canEnter && a.pos >= 0) return -1;
                    if (b.canEnter && b.pos >= 0) return 1;
                    // Prefer tokens that are further ahead
                    return (b.pos || 0) - (a.pos || 0);
                });

                const move = movable[0];
                const result = moveToken(playerIdx, move.idx, move);
                return { moved: true, dice: dice, tokenIdx: move.idx, result: result };
            }

            // ─── UI UPDATE ──────────────────────────────────────────────

            function updateDiceDisplay(val) {
                const el = document.getElementById('diceDisplay');
                el.textContent = getDiceEmoji(val);
                el.classList.remove('rolling');
                void el.offsetWidth;
                el.classList.add('rolling');
            }

            function updateTurnIndicator() {
                const dot = document.getElementById('turnDot');
                const label = document.getElementById('turnLabel');
                if (game.winner >= 0) {
                    dot.style.background = '#ffd700';
                    label.textContent = '🏆 Game Over';
                    return;
                }
                const p = game.currentPlayer;
                dot.style.background = COLORS[p];
                label.textContent = COLOR_NAMES[p] + '\'s Turn';
            }

            function updateStatus(msg) {
                document.getElementById('statusMsg').textContent = msg;
            }

            function updatePlayerStats() {
                const container = document.getElementById('playerStats');
                container.innerHTML = '';
                for (let i = 0; i < game.players.length; i++) {
                    const p = game.players[i];
                    const div = document.createElement('div');
                    div.className = 'player-badge';
                    const dot = document.createElement('span');
                    dot.className = 'color-dot';
                    dot.style.background = COLORS[i];
                    div.appendChild(dot);
                    const name = document.createElement('span');
                    name.textContent = p.name;
                    div.appendChild(name);
                    const count = document.createElement('span');
                    count.className = 'home-count';
                    count.textContent = p.finishedCount + '/4';
                    div.appendChild(count);
                    if (i === game.currentPlayer && game.winner < 0) {
                        div.style.borderColor = COLORS[i];
                        div.style.borderWidth = '2px';
                        div.style.borderStyle = 'solid';
                    }
                    container.appendChild(div);
                }
            }

            function updateRollBtn() {
                const btn = document.getElementById('rollBtn');
                btn.disabled = (game.phase !== 'ROLL' || game.winner >= 0);
                if (game.winner >= 0) {
                    btn.textContent = '🎉 Done';
                } else if (game.phase === 'ROLL') {
                    btn.textContent = '🎲 Roll';
                } else {
                    btn.textContent = '⏳ ...';
                }
            }

            // ─── MAIN GAME FLOW ─────────────────────────────────────────

            function rollDice() {
                if (game.phase !== 'ROLL' || game.winner >= 0) return;
                if (game.currentPlayer === 0) {
                    // Human player (Red)
                    const dice = Math.floor(Math.random() * 6) + 1;
                    game.diceValue = dice;
                    updateDiceDisplay(dice);

                    const movable = getMovableTokens(0, dice);
                    if (movable.length === 0) {
                        updateStatus('No moves available!');
                        setTimeout(() => endTurn(0), 600);
                        return;
                    }

                    // If only one movable token, auto-move it
                    if (movable.length === 1) {
                        const move = movable[0];
                        const result = moveToken(0, move.idx, move);
                        updateStatus(`${COLOR_NAMES[0]} moves token ${move.idx+1}`);
                        drawBoard();
                        updatePlayerStats();
                        setTimeout(() => {
                            if (game.winner >= 0) {
                                showWinner(game.winner);
                            } else {
                                endTurn(0);
                            }
                        }, 500);
                        return;
                    }

                    // Multiple movable - let user select
                    game.phase = 'SELECT';
                    updateStatus('Select a token to move');
                    updateRollBtn();
                    drawBoard();
                    return;
                } else {
                    // AI players
                    const result = aiTurn(game.currentPlayer);
                    updateStatus(`${COLOR_NAMES[game.currentPlayer]} rolled ${result.dice}`);
                    drawBoard();
                    updatePlayerStats();
                    if (game.winner >= 0) {
                        setTimeout(() => showWinner(game.winner), 400);
                        return;
                    }
                    setTimeout(() => {
                        endTurn(game.currentPlayer);
                    }, 600 + (result.moved ? 200 : 0));
                }
            }

            function endTurn(playerIdx) {
                if (game.winner >= 0) return;
                // Check if player rolled 6 and can roll again (except AI - skip for simplicity)
                // For simplicity, we'll just advance to next player
                let next = (playerIdx + 1) % NUM_PLAYERS;
                // Skip finished players
                let attempts = 0;
                while (game.players[next].finishedCount === TOKENS_PER_PLAYER && attempts < NUM_PLAYERS) {
                    next = (next + 1) % NUM_PLAYERS;
                    attempts++;
                }
                if (attempts >= NUM_PLAYERS) {
                    // All players finished?
                    return;
                }
                game.currentPlayer = next;
                game.phase = 'ROLL';
                updateTurnIndicator();
                updatePlayerStats();
                updateRollBtn();
                updateStatus(`${COLOR_NAMES[next]}'s turn`);
                drawBoard();

                // If next is AI, trigger automatically
                if (next !== 0 && game.winner < 0) {
                    setTimeout(() => rollDice(), 400);
                }
            }

            function handleTokenClick(row, col) {
                if (game.phase !== 'SELECT' || game.currentPlayer !== 0) return;

                // Find which token was clicked
                const player = game.players[0];
                const dice = game.diceValue;
                const movable = getMovableTokens(0, dice);

                // Check if click is on any movable token
                for (let i = 0; i < movable.length; i++) {
                    const move = movable[i];
                    const pos = getTokenPosition(0, move.idx);
                    if (!pos) continue;
                    // Check if click is near this token
                    const cx = pos.col * cellSize + cellSize / 2;
                    const cy = pos.row * cellSize + cellSize / 2;
                    const dist = Math.sqrt((col - cx) ** 2 + (row - cy) ** 2);
                    if (dist < cellSize * 0.4) {
                        // Move this token
                        const result = moveToken(0, move.idx, move);
                        updateStatus(`${COLOR_NAMES[0]} moves token ${move.idx+1}`);
                        game.phase = 'ANIMATING';
                        drawBoard();
                        updatePlayerStats();
                        if (game.winner >= 0) {
                            setTimeout(() => showWinner(game.winner), 400);
                            return;
                        }
                        setTimeout(() => {
                            game.phase = 'ROLL';
                            endTurn(0);
                        }, 500);
                        return;
                    }
                }
                updateStatus('Tap a highlighted token');
            }

            function showWinner(playerIdx) {
                const overlay = document.getElementById('winnerOverlay');
                document.getElementById('winText').textContent =
                    `${COLOR_NAMES[playerIdx]} Wins! 🎉`;
                document.getElementById('winSub').textContent =
                    `${COLOR_NAMES[playerIdx]} king of the board!`;
                overlay.classList.add('show');
                updateStatus(`🏆 ${COLOR_NAMES[playerIdx]} wins!`);
                updateRollBtn();
                drawBoard();
            }

            // ─── CANVAS CLICK HANDLER ──────────────────────────────────

            function handleCanvasClick(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvasSize / rect.width;
                const scaleY = canvasSize / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                const col = Math.floor(x / cellSize);
                const row = Math.floor(y / cellSize);
                if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
                    handleTokenClick(row, col);
                }
            }

            // ─── RESET ──────────────────────────────────────────────────

            function resetGame() {
                if (game.winner >= 0 || game.turnCount > 0) {
                    if (!confirm('Start a new game?')) return;
                }
                initGame();
                game.currentPlayer = 0;
                game.phase = 'ROLL';
                document.getElementById('diceDisplay').textContent = '⚀';
                updateTurnIndicator();
                updatePlayerStats();
                updateRollBtn();
                updateStatus('🎲 Roll the dice!');
                drawBoard();
                document.getElementById('winnerOverlay').classList.remove('show');
            }

            // ─── INIT ──────────────────────────────────────────────────

            function init() {
                initGame();
                resizeCanvas();
                updateTurnIndicator();
                updatePlayerStats();
                updateRollBtn();
                updateStatus('🎲 Roll the dice!');

                // Events
                window.addEventListener('resize', resizeCanvas);
                canvas.addEventListener('click', handleCanvasClick);
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvasSize / rect.width;
                    const scaleY = canvasSize / rect.height;
                    const x = (touch.clientX - rect.left) * scaleX;
                    const y = (touch.clientY - rect.top) * scaleY;
                    const col = Math.floor(x / cellSize);
                    const row = Math.floor(y / cellSize);
                    if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
                        handleTokenClick(row, col);
                    }
                }, { passive: false });

                document.getElementById('rollBtn').addEventListener('click', rollDice);
                document.getElementById('resetBtn').addEventListener('click', resetGame);
                document.getElementById('playAgainBtn').addEventListener('click', resetGame);

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'r' || e.key === 'R') resetGame();
                    if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        rollDice();
                    }
                });

                // If first player is AI? No, human is Red (index 0)
                // All good
            }

            // Start when ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
