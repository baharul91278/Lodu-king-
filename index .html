<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Game</title>

<style>
body{
    margin:0;
    background:#1a1a1a;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    text-align:center;
}
h1{
    color:#fff;
}
canvas{
    background:#fff;
    border:5px solid #333;
    border-radius:12px;
}
button{
    margin-top:15px;
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#28a745;
    color:#fff;
}
button:hover{
    background:#218838;
}
</style>
</head>

<body>

<div class="container">
<h1>🎲 My Ludo Game</h1>

<canvas id="board" width="600" height="600"></canvas>

<br>

<button onclick="rollDice()">🎲 Roll Dice</button>

<h2 id="dice">Dice : 1</h2>
</div>

<script>
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

function drawBoard(){

ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,600,600);

ctx.fillStyle="red";
ctx.fillRect(0,0,200,200);

ctx.fillStyle="green";
ctx.fillRect(400,0,200,200);

ctx.fillStyle="blue";
ctx.fillRect(0,400,200,200);

ctx.fillStyle="yellow";
ctx.fillRect(400,400,200,200);

ctx.strokeStyle="#000";
ctx.lineWidth=2;

for(let i=0;i<=15;i++){
ctx.beginPath();
ctx.moveTo(i*40,0);
ctx.lineTo(i*40,600);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i*40);
ctx.lineTo(600,i*40);
ctx.stroke();
}

ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(300,300,40,0,Math.PI*2);
ctx.fill();
}

drawBoard();

function rollDice(){
let dice=Math.floor(Math.random()*6)+1;
document.getElementById("dice").innerHTML="Dice : "+dice;
}
</script>

</body>
</html>
